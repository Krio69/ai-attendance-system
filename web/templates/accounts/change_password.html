{% extends "base.html" %}
{% block title %}Change Password — AttendAI{% endblock %}

{% block content %}
<div class="page-header change-password-page-header">
    <h4><i class="bi bi-key"></i> Change Password</h4>
</div>

<div class="row justify-content-center change-password-page">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="card change-password-card">
            <div class="card-body change-password-card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="form-actions d-grid gap-2 d-sm-flex">
                        <button type="submit" class="btn btn-primary btn-icon">
                            <i class="bi bi-check-lg"></i> Update Password
                        </button>
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
